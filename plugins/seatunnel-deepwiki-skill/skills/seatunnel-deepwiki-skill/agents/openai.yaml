interface:
  display_name: "SeaTunnel Repository Assistant"
  short_description: "Answers Apache SeaTunnel repository questions"
  default_prompt: "Use $seatunnel-deepwiki-skill to answer my Apache SeaTunnel repository question."

dependencies:
  tools:
    - type: "mcp"
      value: "deepwiki"
      description: "Official DeepWiki MCP server used as the repository knowledge retrieval channel"
      transport: "streamable_http"
      url: "https://mcp.deepwiki.com/mcp"

policy:
  allow_implicit_invocation: true
