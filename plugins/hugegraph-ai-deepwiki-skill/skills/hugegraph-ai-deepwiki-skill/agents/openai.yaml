interface:
  display_name: "HugeGraph AI DeepWiki"
  short_description: "Answers HugeGraph AI questions via DeepWiki"
  default_prompt: "Use $hugegraph-ai-deepwiki-skill to answer my Apache HugeGraph AI question with DeepWiki-backed repository context."

dependencies:
  tools:
    - type: "mcp"
      value: "deepwiki"
      description: "Official DeepWiki MCP server for repository-grounded wiki questions"
      transport: "streamable_http"
      url: "https://mcp.deepwiki.com/mcp"

policy:
  allow_implicit_invocation: true
